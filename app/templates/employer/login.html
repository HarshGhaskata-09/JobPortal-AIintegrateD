{% extends "base.html" %}

{% block title %}Employer Login{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-2">Employer Portal</h2>
                        <p class="text-muted">Sign in to manage your job postings</p>
                    </div>

                    <form method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Company Email</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="company@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="position-relative">
                                <input type="password" class="form-control form-control-lg pe-5" id="password" name="password" placeholder="Enter your password" required>
                                <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-decoration-none pe-3" onclick="togglePassword('password', 'password-icon')" style="z-index: 10;">
                                    <i class="fas fa-eye" id="password-icon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label" for="remember">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 mb-3">Sign In to Dashboard</button>

                        <div class="text-center">
                            <p class="mb-2">Don't have an account? <a href="{{ url_for('employer_auth.register') }}" class="text-decoration-none fw-semibold">Register Company</a></p>
                            <p class="text-muted small">Looking for a job? <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Job Seeker Login</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
