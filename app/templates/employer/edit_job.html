{% extends "base.html" %}

{% block title %}Edit Job - Employer Portal{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Job</h1>

<form method="POST">
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Job Title *</label>
                <input type="text" class="form-control" name="title" value="{{ job.title }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Company *</label>
                <input type="text" class="form-control" name="company" value="{{ job.company }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" name="location" value="{{ job.location or '' }}">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Job Type</label>
                <select class="form-select" name="job_type">
                    <option value="Full-time" {{ 'selected' if job.job_type == 'Full-time' else '' }}>Full-time</option>
                    <option value="Part-time" {{ 'selected' if job.job_type == 'Part-time' else '' }}>Part-time</option>
                    <option value="Remote" {{ 'selected' if job.job_type == 'Remote' else '' }}>Remote</option>
                    <option value="Contract" {{ 'selected' if job.job_type == 'Contract' else '' }}>Contract</option>
                    <option value="Hybrid" {{ 'selected' if job.job_type == 'Hybrid' else '' }}>Hybrid</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Required Skills (comma-separated)</label>
                <input type="text" class="form-control" name="required_skills" value="{{ job.required_skills or '' }}">
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Description *</label>
                <textarea class="form-control" name="description" rows="4" required>{{ job.description }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Requirements</label>
                <textarea class="form-control" name="requirements" rows="4">{{ job.requirements or '' }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-6">
                    <label class="form-label">Min Experience (years)</label>
                    <input type="number" class="form-control" name="experience_min" value="{{ job.experience_min or 0 }}" min="0">
                </div>
                <div class="col-6">
                    <label class="form-label">Max Experience (years)</label>
                    <input type="number" class="form-control" name="experience_max" value="{{ job.experience_max or 0 }}" min="0">
                </div>
            </div>
            
            <div class="row mt-3">
                <div class="col-6">
                    <label class="form-label">Min Salary</label>
                    <input type="number" class="form-control" name="salary_min" value="{{ job.salary_min or 0 }}" min="0">
                </div>
                <div class="col-6">
                    <label class="form-label">Max Salary</label>
                    <input type="number" class="form-control" name="salary_max" value="{{ job.salary_max or 0 }}" min="0">
                </div>
            </div>
            
            <div class="mb-3 mt-3">
                <label class="form-label">Category</label>
                <select class="form-select" name="category">
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {{ 'selected' if job.category_id == cat.id else '' }}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Application Deadline</label>
                <input type="date" class="form-control" name="deadline" 
                       value="{{ job.application_deadline.strftime('%Y-%m-%d') if job.application_deadline else '' }}">
            </div>
            
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="is_featured" id="is_featured" 
                       {{ 'checked' if job.is_featured else '' }}>
                <label class="form-check-label" for="is_featured">
                    Mark as Featured
                </label>
            </div>
        </div>
    </div>
    
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Update Job
        </button>
        <a href="{{ url_for('employer.job_detail', job_id=job.id) }}" class="btn btn-secondary">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
