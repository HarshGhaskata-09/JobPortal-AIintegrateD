{% extends "base.html" %}

{% block title %}Edit Portfolio - Job Recommendation Portal{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Portfolio</h1>

<form method="post">
    <div class="mb-3">
        <label class="form-label" for="title">Title</label>
        <input class="form-control" id="title" name="title" value="{{ portfolio.title or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label" for="headline">Headline</label>
        <input class="form-control" id="headline" name="headline" value="{{ portfolio.headline or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label" for="summary">Summary</label>
        <textarea class="form-control" id="summary" name="summary" rows="4">{{ portfolio.summary or '' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label" for="visibility">Profile Visibility</label>
        <select class="form-select" id="visibility" name="visibility">
            <option value="public" {% if portfolio.profile_visibility == 'public' %}selected{% endif %}>Public</option>
            <option value="private" {% if portfolio.profile_visibility == 'private' %}selected{% endif %}>Private</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
